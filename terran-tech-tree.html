<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarCraft II Terran Tech Tree</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/vis-network/styles/vis-network.min.css"
  />
  <style>
    :root {
      --bg-1: #0d1320;
      --bg-2: #161d2b;
      --panel: rgba(16, 22, 35, 0.72);
      --panel-strong: rgba(18, 25, 39, 0.86);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f7fb;
      --muted: #a5b0c4;
      --accent: #5ab2ff;
      --accent-soft: rgba(90, 178, 255, 0.18);
      --accent-2: #ecc263;
      --accent-2-soft: rgba(236, 194, 99, 0.16);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    html,
    body {
      height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, var(--accent-soft), transparent 18%),
        radial-gradient(circle at 82% 18%, var(--accent-2-soft), transparent 16%),
        radial-gradient(circle at 70% 82%, rgba(126, 86, 184, 0.14), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 12% 24%, rgba(255, 255, 255, 0.24) 0 1px, transparent 1.2px),
        radial-gradient(circle at 32% 62%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 74% 34%, rgba(255, 255, 255, 0.2) 0 1px, transparent 1.2px),
        radial-gradient(circle at 88% 72%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 60% 88%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1.2px);
      opacity: 0.65;
      background-size: 360px 360px;
      animation: drift 20s linear infinite;
    }

    body::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      mix-blend-mode: screen;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-24px, 18px, 0);
      }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1240px, calc(100% - clamp(16px, 3vw, 32px)));
      height: calc(100dvh - clamp(16px, 3vw, 48px));
      min-height: calc(100dvh - clamp(16px, 3vw, 48px));
      margin: clamp(8px, 2vw, 24px) auto;
      padding: clamp(14px, 2.3vw, 28px);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(20, 27, 42, 0.72), rgba(13, 18, 29, 0.78));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: minmax(0, 2.15fr) minmax(290px, 1fr);
      gap: clamp(14px, 2vw, 22px);
    }

    .canvas-pane {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .canvas-card,
    .info-pane {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }

    .canvas-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .canvas-header {
      padding: clamp(14px, 1.8vw, 18px) clamp(16px, 2vw, 22px) clamp(12px, 1.5vw, 14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 10px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        var(--panel);
    }

    .canvas-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-width: 0;
    }

    .canvas-title {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .canvas-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 52ch;
    }

    .canvas-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .canvas-badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--accent-2);
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .like-widget {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 28%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(11, 16, 27, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      flex: 0 0 auto;
    }

    .like-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1;
    }

    .like-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      height: 38px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      background: linear-gradient(135deg, rgba(90, 178, 255, 0.28), rgba(236, 194, 99, 0.18));
      transition: transform 160ms ease, border-color 160ms ease, opacity 160ms ease;
    }

    .like-button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .like-button:disabled {
      cursor: not-allowed;
      opacity: 0.76;
    }

    .like-widget[data-like-state="liked"] .like-button {
      color: var(--accent-2);
      background: linear-gradient(135deg, rgba(236, 194, 99, 0.24), rgba(255, 255, 255, 0.08));
    }

    .playback-panel {
      padding: 16px 18px 18px;
      display: grid;
      gap: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top left, rgba(90, 178, 255, 0.14), transparent 26%),
        radial-gradient(circle at 88% 22%, rgba(236, 194, 99, 0.12), transparent 18%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        rgba(9, 14, 24, 0.42);
    }

    .playback-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .playback-kicker {
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.72rem;
      color: var(--accent-2);
      font-weight: 800;
    }

    .playback-title {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.15;
      color: var(--text);
    }

    .playback-controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
    }

    .playback-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      min-width: 84px;
      height: 40px;
      padding: 0 16px;
      font: inherit;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      background:
        linear-gradient(135deg, rgba(90, 178, 255, 0.34), rgba(236, 194, 99, 0.22)),
        rgba(255, 255, 255, 0.04);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
    }

    .playback-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.2);
    }

    .playback-button[aria-pressed="true"] {
      color: #09111a;
      background:
        linear-gradient(135deg, rgba(236, 194, 99, 0.92), rgba(255, 255, 255, 0.82)),
        rgba(255, 255, 255, 0.08);
    }

    .playback-slider {
      width: 100%;
      margin: 0;
      accent-color: var(--accent-2);
      cursor: pointer;
    }

    .time-readout {
      min-width: 98px;
      padding: 10px 12px;
      border-radius: 14px;
      text-align: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e5edf8;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    #network {
      flex: 1 1 auto;
      min-height: 0;
      touch-action: none;
      overscroll-behavior: contain;
      background:
        radial-gradient(circle at 16% 18%, rgba(90, 178, 255, 0.08), transparent 18%),
        radial-gradient(circle at 84% 78%, rgba(236, 194, 99, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 249, 253, 0.98)),
        linear-gradient(90deg, rgba(162, 177, 205, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(162, 177, 205, 0.08) 1px, transparent 1px);
      background-size: auto, auto, auto, 48px 48px, 48px 48px;
    }

    .info-pane {
      background: var(--panel-strong);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 22px 20px 28px;
      height: 100%;
      overflow-y: auto;
    }

    .info-kicker {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.73rem;
      color: var(--accent-2);
      font-weight: 800;
    }

    .info-title {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
      color: var(--text);
    }

    .info-lead {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      padding: 12px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .stat-card strong {
      display: block;
      font-size: 1.1rem;
      color: var(--accent-2);
    }

    .stat-card span {
      display: block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tag-list,
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag,
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce6f5;
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      flex: 0 0 auto;
    }

    .meta {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce6f5;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .relationship-card {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(8, 12, 20, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .relationship-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .media-card {
      margin-top: 16px;
      padding: 12px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(8, 12, 20, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .node-image {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .image-empty {
      display: grid;
      place-items: center;
      min-height: 170px;
      text-align: center;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: minmax(0, 1.8fr) minmax(270px, 0.95fr);
      }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        width: min(100% - 16px, 1240px);
        height: auto;
        min-height: 0;
        margin: 8px auto;
        padding: 14px;
        grid-template-columns: 1fr;
      }

      .canvas-card {
        height: auto;
        min-height: 0;
      }

      #network {
        height: clamp(360px, 62dvh, 560px);
        min-height: clamp(360px, 62dvh, 560px);
      }

      .info-pane {
        height: auto;
        border-left: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .canvas-title-row {
        align-items: flex-start;
      }

      .playback-controls {
        grid-template-columns: 1fr;
      }

      .playback-button,
      .time-readout {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: calc(100% - 12px);
        margin: 6px auto;
        padding: 10px;
        border-radius: 20px;
      }

      .canvas-card,
      .info-pane {
        border-radius: 20px;
      }

      .canvas-title,
      .info-title {
        font-size: 1.28rem;
      }

      .canvas-subtitle,
      .info-lead {
        font-size: 0.9rem;
      }

      .canvas-title-row {
        flex-wrap: wrap;
      }

      .header-link,
      .canvas-badge,
      .like-button {
        padding: 9px 12px;
        font-size: 0.76rem;
      }

      .like-count,
      .like-button {
        height: 34px;
      }

      .like-count {
        min-width: 42px;
        padding: 0 10px;
      }

      .playback-panel {
        padding: 14px 14px 16px;
      }

      .playback-title {
        font-size: 0.95rem;
      }

      #network {
        height: clamp(320px, 58dvh, 460px);
        min-height: clamp(320px, 58dvh, 460px);
      }

      .info-pane {
        padding: 18px 16px 22px;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="canvas-pane">
      <section class="canvas-card">
        <div class="canvas-header">
          <div class="canvas-title-row">
            <h1 class="canvas-title">Terran Tech Tree</h1>
            <div class="like-widget" data-like-widget data-tree-key="terran" data-tree-label="Terran Tech Tree">
              <button class="like-button" type="button" data-like-button>Loading...</button>
              <span class="like-count" data-like-count aria-live="polite">--</span>
            </div>
          </div>
          <div class="canvas-actions">
            <p class="canvas-subtitle">
              Drag nodes, zoom the map, scrub the opening, and click any node or arrow for details.
            </p>
            <a class="header-link" href="index.html">Back to Wiki</a>
          </div>
        </div>
        <div class="playback-panel" aria-label="Build order playback slider">
          <div class="playback-head">
            <div>
              <p class="playback-kicker">Build Order Playback</p>
              <h2 class="playback-title" id="build-order-name">Reaper Fast Expand into 1-1-1</h2>
            </div>
            <div class="canvas-badge" id="build-order-range">0:00 to 5:00</div>
          </div>
          <div class="playback-controls">
            <button class="playback-button" id="build-order-toggle" type="button" aria-pressed="false">Play</button>
            <input
              class="playback-slider"
              id="build-order-slider"
              type="range"
              min="0"
              max="300"
              value="0"
              step="1"
              aria-label="Build order timeline"
            />
            <div class="time-readout" id="build-order-time" aria-live="polite">Time: 0:00</div>
          </div>
        </div>
        <div id="network"></div>
      </section>
    </main>

    <aside class="info-pane" id="info-panel"></aside>
  </div>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script>
    const rawNodes = [
      {

        }

          cost: { minerals: 100, gas: 0, supply: 0 },

      },
      {
        name: "Refinery",
        label: "Refinery",
        group: "tier1",
        x: 620,

        details: {
          description: "Built on Vespene Geysers to allow SCVs to harvest Vespene Gas.",
          cost: { minerals: 75, gas: 0, supply: 0 },

          unlocks: ["Vespene Gas harvesting"]
        }
      },
      {
        name: "Engineering Bay",
        label: "Engineering\nBay",
        group: "tier15",
        x: 620,

      "img/terran/SC2Armory.jpg",
      "img/terran/SC2Starport.jpg",
      "img/terran/SC2EngineeringBay.jpg"
    ];

    const infoPanel = document.getElementById("info-panel");

    function normalizeAssetKey(value) {
      return String(value)
        .toLowerCase()
        .replace(/^sc2/, "")
        .replace(/[^a-z0-9]+/g, "");
    }

    const terranImageMap = Object.fromEntries(
      terranImageFiles.map((path) => {
        const filename = path.split("/").pop().replace(/\.[^.]+$/, "");
        return [normalizeAssetKey(filename), path];
      })
    );

    const terranImageFallbacks = {
      orbitalcommand: "img/terran/SC2CommandCenter.jpg"
    };

    const nodesById = Object.fromEntries(rawNodes.map((node) => [node.name, node]));
    const nodeIds = new Set(rawNodes.map((node) => node.name));

    const buildOrderName = "Reaper Fast Expand into 1-1-1";
    const buildOrderDuration = 300;
    const buildOrder = [
      { time: 0, targetNode: "Command Center", label: "Start with Command Center" },
      { time: 0, targetNode: "SCV", label: "Start with SCV" },
      { time: 0, targetNode: "Minerals", label: "Start with Minerals" },
      { time: 18, targetNode: "Supply Depot", label: "Supply Depot" },
      { time: 39, targetNode: "Barracks", label: "Barracks" },
      { time: 45, targetNode: "Refinery", label: "Refinery" },
      { time: 90, targetNode: "Reaper", label: "Reaper" },
      { time: 90, targetNode: "Vespene Gas", label: "Vespene Gas" },
      { time: 105, targetNode: "Orbital Command", label: "Orbital Command" },
      { time: 120, targetNode: "Factory", label: "Factory" },
      { time: 135, targetNode: "Reactor", label: "Reactor" },
      { time: 150, targetNode: "Marine", label: "Marine" },
      { time: 165, targetNode: "Starport", label: "Starport" },
      { time: 170, targetNode: "Hellion", label: "Hellion" },
      { time: 200, targetNode: "Medivac", label: "Medivac" },
      { time: 210, targetNode: "Widow Mine", label: "Widow Mine" }
    ];
    const buildOrderNodeIds = new Set(buildOrder.map((step) => step.targetNode));

    function assertKnownNodeId(nodeId, contextLabel) {
      if (!nodeIds.has(nodeId)) {
        throw new Error(contextLabel + ' references an unknown node id: "' + nodeId + '".');
      }
    }

    buildOrder.forEach((step) => {
      assertKnownNodeId(step.targetNode, "Build order");
    });

    rawRelations.forEach((relation) => {
      assertKnownNodeId(relation.fromName, "Edge source");
      assertKnownNodeId(relation.toName, "Edge target");
    });

    function getVisibleNodeIdsAtTime(currentTime) {
      return new Set(
        buildOrder
          .filter((step) => currentTime >= step.time)
          .map((step) => step.targetNode)
      );
    }

    const initialVisibleNodeIds = getVisibleNodeIdsAtTime(0);

    const visNodes = new vis.DataSet(
      rawNodes.map((node) => ({
        id: node.name,
        label: node.label,
        group: node.group,
        x: node.x,
        y: node.y,
        title: node.name,
        hidden: !initialVisibleNodeIds.has(node.name),
        physics: false,
        fixed: {
          x: true,
          y: true
        },
        font: {
          color: "#10212d",
          face: "Avenir Next, Segoe UI, sans-serif",
          size: 16,
          bold: {
            color: "#10212d",
            face: "Avenir Next, Segoe UI, sans-serif",
            size: 16
          }
        },
        margin: 14
      }))
    );

    const visEdges = new vis.DataSet(
      rawRelations.map((relation, index) => {
        const style = edgeStyles[relation.type] || { color: "#6b7c8c", width: 2 };
        return {
          id: "edge-" + (index + 1),
          from: relation.fromName,
          to: relation.toName,
          arrows: "to",
          color: { color: style.color, highlight: style.color, hover: style.color },
          width: style.width,
          dashes: style.dashes || false,
          hidden: !(initialVisibleNodeIds.has(relation.fromName) && initialVisibleNodeIds.has(relation.toName)),
          title: relation.type + ": " + relation.description,
          relationType: relation.type,
          description: relation.description,
          fromName: relation.fromName,
          toName: relation.toName,
          smooth: false
        };
      })
    );

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatCostValue(value) {
      return value === null || value === undefined ? "N/A" : String(value);
    }

    function renderTags(items) {
      return '<div class="tag-list">' + items.map((item) => '<span class="tag">' + escapeHtml(item) + "</span>").join("") + "</div>";
    }

    function renderSection(title, items) {
      if (!items || !items.length) {
        return "";
      }
      return '<section class="section"><h3>' + escapeHtml(title) + "</h3>" + renderTags(items) + "</section>";
    }

    function renderNodeImage(node) {
      const normalizedName = normalizeAssetKey(node.name);
      const imagePath = terranImageMap[normalizedName] || terranImageFallbacks[normalizedName];
      if (!imagePath) {
        return [
          '<div class="media-card">',
          '<div class="image-empty">No local image found for ' + escapeHtml(node.name) + ' in <code>img/terran</code>.</div>',
          "</div>"
        ].join("");
      }

      return [
        '<div class="media-card">',
        '<img class="node-image" src="' + escapeHtml(imagePath) + '" alt="' + escapeHtml(node.name) + '" loading="lazy" />',
        "</div>"
      ].join("");
    }

    function renderLegend() {
      const legendItems = [
        ["resource", "Resource"],
        ["worker", "Worker"],
        ["tier1", "Tier 1"],
        ["tier15", "Tier 1.5"],
        ["tier2", "Tier 2"],
        ["tier25", "Tier 2.5"],
        ["tier3", "Tier 3"],
        ["tier35", "Tier 3.5"],
        ["addon", "Add-on"]
      ];

      return (
        '<section class="section"><h3>Legend</h3><div class="legend">' +
        legendItems
          .map(([group, label]) => {
            const swatch = groupStyles[group].color.background;
            return '<span class="legend-item"><span class="swatch" style="background:' + swatch + ';"></span>' + escapeHtml(label) + "</span>";
          })
          .join("") +
        "</div></section>"
      );
    }

    function renderDefaultPanel() {
      infoPanel.innerHTML = [
        '<p class="info-kicker">Info Panel</p>',
        '<h2 class="info-title">Terran Production Map</h2>',
        '<p class="info-lead">Select a node to inspect its description, costs, requirements, and outputs. Select an edge to read the exact relationship between two tech nodes.</p>',
        '<div class="meta">Tip: scrub the build slider to reveal the opener, then click any visible node or edge for details.</div>',
        renderLegend(),
        '<section class="section"><h3>Scope</h3><p class="info-lead">This map uses only the supplied Terran units, structures, resources, and add-ons. The build playback now reveals a Reaper fast expand opener directly on the main tech tree timeline.</p></section>'
      ].join("");
    }

    function renderNodePanel(node) {
      const details = node.details || {};
      const cost = details.cost || {};
      const sectionHtml = [
        renderSection("Requires", details.requires),
        renderSection("Produces", details.produces),
        renderSection("Unlocks", details.unlocks),
        renderSection("Upgrades From", details.upgradesFrom),
        renderSection("Upgrades To", details.upgradesTo),
        renderSection("Provides", details.provides),
        renderSection("Builds", details.builds),
        renderSection("Harvests", details.harvests),
        renderSection("Attaches To", details.attachesTo),
        renderSection("Effect", details.effect),
        renderSection("Used For", details.usedFor),
        renderSection("Provided By", details.providedBy),
        renderSection("Add-ons", details.addOns)
      ].join("");

      infoPanel.innerHTML = [
        '<p class="info-kicker">Node</p>',
        '<h2 class="info-title">' + escapeHtml(node.name) + "</h2>",
        '<div class="meta">' + escapeHtml(groupLabels[node.group] || node.group) + "</div>",
        renderNodeImage(node),
        '<p class="info-lead">' + escapeHtml(details.description || "No description provided.") + "</p>",
        '<section class="section"><h3>Costs</h3>',
        '<div class="stats">',
        '<div class="stat-card"><strong>' + formatCostValue(cost.minerals) + '</strong><span>Minerals</span></div>',
        '<div class="stat-card"><strong>' + formatCostValue(cost.gas) + '</strong><span>Gas</span></div>',
        '<div class="stat-card"><strong>' + formatCostValue(cost.supply) + '</strong><span>Supply</span></div>',
        "</div></section>",
        sectionHtml
      ].join("");
    }

    function renderEdgePanel(edge) {
      infoPanel.innerHTML = [
        '<p class="info-kicker">Relationship</p>',
        '<h2 class="info-title">' + escapeHtml(edge.relationType) + "</h2>",
        '<div class="relationship-card">',
        '<strong>' + escapeHtml(edge.fromName) + " -> " + escapeHtml(edge.toName) + "</strong>",
        '<p>' + escapeHtml(edge.description) + "</p>",
        "</div>",
        '<section class="section"><h3>Interpretation</h3><p class="info-lead">This arrow shows how the source node contributes to, unlocks, upgrades into, produces, or enables the target node inside the Terran tech tree.</p></section>'
      ].join("");
    }

    renderDefaultPanel();

    const container = document.getElementById("network");
    const data = { nodes: visNodes, edges: visEdges };
    const options = {
      autoResize: true,
      physics: false,
      groups: groupStyles,
      nodes: {
        borderWidth: 2,
        borderWidthSelected: 3,
        shadow: {
          enabled: true,
          color: "rgba(23, 35, 47, 0.18)",
          size: 16,
          x: 0,
          y: 8
        }
      },
      edges: {
        arrows: {
          to: {
            enabled: true,
            scaleFactor: 0.78
          }
        },
        selectionWidth: 4,
        hoverWidth: 3,
        smooth: false
      },
      interaction: {
        dragNodes: true,
        dragView: true,
        zoomView: true,
        hover: true,
        navigationButtons: true,
        keyboard: true,
        tooltipDelay: 100
      }
    };

    const network = new vis.Network(container, data, options);
    const playbackTitle = document.getElementById("build-order-name");
    const playbackRange = document.getElementById("build-order-range");
    const playbackSlider = document.getElementById("build-order-slider");
    const playbackTime = document.getElementById("build-order-time");
    const playbackToggle = document.getElementById("build-order-toggle");

    let fitTimer = null;
    let playbackTimer = null;
    let lastViewportWidth = window.innerWidth;
    let lastViewportHeight = window.innerHeight;
    let wasCompactViewport = window.matchMedia("(max-width: 980px)").matches;
    const graphBounds = rawNodes
      .filter((node) => buildOrderNodeIds.has(node.name))
      .reduce(
        function (bounds, node) {
          return {
            minX: Math.min(bounds.minX, node.x),
            maxX: Math.max(bounds.maxX, node.x),
            minY: Math.min(bounds.minY, node.y),
            maxY: Math.max(bounds.maxY, node.y)
          };
        },
        { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity }
      );

    function scheduleNetworkFit(delay) {
      window.clearTimeout(fitTimer);
      fitTimer = window.setTimeout(function () {
        network.redraw();
        fitNetworkToViewport();
      }, delay || 0);
    }

    function fitNetworkToViewport() {
      const viewportWidth = container.clientWidth;
      const viewportHeight = container.clientHeight;
      if (!viewportWidth || !viewportHeight) {
        return;
      }

      const horizontalPadding = 440;
      const verticalPadding = 360;
      const spanX = graphBounds.maxX - graphBounds.minX + horizontalPadding;
      const spanY = graphBounds.maxY - graphBounds.minY + verticalPadding;
      let scale = Math.min(viewportWidth / spanX, viewportHeight / spanY);

      if (window.matchMedia("(max-width: 980px)").matches) {
        scale *= 0.92;
      }

      network.moveTo({
        position: {
          x: (graphBounds.minX + graphBounds.maxX) / 2,
          y: (graphBounds.minY + graphBounds.maxY) / 2
        },
        scale: Math.max(0.08, Math.min(scale, 1)),
        animation: false
      });
    }

    function formatPlaybackTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes + ":" + String(seconds).padStart(2, "0");
    }

    function setPlaybackButtonState(isPlaying) {
      playbackToggle.textContent = isPlaying ? "Pause" : "Play";
      playbackToggle.setAttribute("aria-pressed", String(isPlaying));
    }

    function stopPlayback() {
      if (playbackTimer !== null) {
        window.clearInterval(playbackTimer);
        playbackTimer = null;
      }

      setPlaybackButtonState(false);
    }

    function syncSelectionWithVisibility(visibleNodeIds, visibleEdgeIds) {
      const selection = network.getSelection();
      const hasHiddenNodeSelection = selection.nodes.some((nodeId) => !visibleNodeIds.has(nodeId));
      const hasHiddenEdgeSelection = selection.edges.some((edgeId) => !visibleEdgeIds.has(edgeId));

      if (hasHiddenNodeSelection || hasHiddenEdgeSelection) {
        network.unselectAll();
        renderDefaultPanel();
      }
    }

    function updateBuildOrderVisibility(currentTime) {
      const visibleNodeIds = getVisibleNodeIdsAtTime(currentTime);

      visNodes.update(
        rawNodes.map((node) => ({
          id: node.name,
          hidden: !visibleNodeIds.has(node.name)
        }))
      );

      const visibleEdgeIds = new Set();
      visEdges.update(
        rawRelations.map((relation, index) => {
          const edgeId = "edge-" + (index + 1);
          const isVisible = visibleNodeIds.has(relation.fromName) && visibleNodeIds.has(relation.toName);
          if (isVisible) {
            visibleEdgeIds.add(edgeId);
          }

          return {
            id: edgeId,
            hidden: !isVisible
          };
        })
      );

      playbackTime.textContent = "Time: " + formatPlaybackTime(currentTime);
      syncSelectionWithVisibility(visibleNodeIds, visibleEdgeIds);
    }

    function startPlayback() {
      if (playbackTimer !== null) {
        return;
      }

      if (Number(playbackSlider.value) >= buildOrderDuration) {
        playbackSlider.value = "0";
        updateBuildOrderVisibility(0);
      }

      setPlaybackButtonState(true);
      playbackTimer = window.setInterval(function () {
        const currentTime = Number(playbackSlider.value);
        if (currentTime >= buildOrderDuration) {
          stopPlayback();
          return;
        }

        const nextTime = currentTime + 1;
        playbackSlider.value = String(nextTime);
        updateBuildOrderVisibility(nextTime);

        if (nextTime >= buildOrderDuration) {
          stopPlayback();
        }
      }, 50);
    }

    playbackSlider.max = String(buildOrderDuration);
    playbackTitle.textContent = buildOrderName;
    playbackRange.textContent = "0:00 to " + formatPlaybackTime(buildOrderDuration);
    playbackToggle.setAttribute("aria-label", "Play or pause " + buildOrderName);
    playbackToggle.addEventListener("click", function () {
      if (playbackTimer !== null) {
        stopPlayback();
        return;
      }

      startPlayback();
    });

    playbackSlider.addEventListener("input", function () {
      updateBuildOrderVisibility(Number(playbackSlider.value));
    });

    setPlaybackButtonState(false);
    updateBuildOrderVisibility(Number(playbackSlider.value));

    scheduleNetworkFit(80);

    window.addEventListener("resize", function () {
      const widthDelta = Math.abs(window.innerWidth - lastViewportWidth);
      const heightDelta = Math.abs(window.innerHeight - lastViewportHeight);
      const isCompactViewport = window.matchMedia("(max-width: 980px)").matches;
      const viewportModeChanged = isCompactViewport !== wasCompactViewport;

      lastViewportWidth = window.innerWidth;
      lastViewportHeight = window.innerHeight;
      wasCompactViewport = isCompactViewport;

      if (viewportModeChanged || widthDelta > 60 || heightDelta > 140) {
        scheduleNetworkFit(140);
      }
    }, { passive: true });

    window.addEventListener("orientationchange", function () {
      scheduleNetworkFit(180);
    }, { passive: true });

    window.addEventListener("pageshow", function () {
      scheduleNetworkFit(60);
    });

    network.once("stabilized", function () {
      fitNetworkToViewport();
    });

    network.on("click", function (params) {
      if (params.nodes.length) {
        renderNodePanel(nodesById[params.nodes[0]]);
        return;
      }

      if (params.edges.length) {
        renderEdgePanel(visEdges.get(params.edges[0]));
        return;
      }

      renderDefaultPanel();
    });
  </script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="tech-tree-likes.js"></script>
</body>
</html>
