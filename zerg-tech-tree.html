<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarCraft II Zerg Tech Tree</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/vis-network/styles/vis-network.min.css"
  />
  <style>
    :root {
      --bg-1: #0d1320;
      --bg-2: #161d2b;
      --panel: rgba(16, 22, 35, 0.72);
      --panel-strong: rgba(18, 25, 39, 0.86);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f7fb;
      --muted: #a5b0c4;
      --accent: #8fcb63;
      --accent-soft: rgba(143, 203, 99, 0.18);
      --accent-2: #e5a15d;
      --accent-2-soft: rgba(229, 161, 93, 0.16);
      --shadow: rgba(0, 0, 0, 0.36);
    }

    html,
    body {
      height: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, var(--accent-soft), transparent 18%),
        radial-gradient(circle at 82% 18%, var(--accent-2-soft), transparent 16%),
        radial-gradient(circle at 70% 82%, rgba(126, 86, 184, 0.14), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 12% 24%, rgba(255, 255, 255, 0.24) 0 1px, transparent 1.2px),
        radial-gradient(circle at 32% 62%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 74% 34%, rgba(255, 255, 255, 0.2) 0 1px, transparent 1.2px),
        radial-gradient(circle at 88% 72%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 60% 88%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1.2px);
      opacity: 0.65;
      background-size: 360px 360px;
      animation: drift 20s linear infinite;
    }

    body::after {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      mix-blend-mode: screen;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-24px, 18px, 0);
      }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1240px, calc(100% - clamp(16px, 3vw, 32px)));
      height: calc(100dvh - clamp(16px, 3vw, 48px));
      min-height: calc(100dvh - clamp(16px, 3vw, 48px));
      margin: clamp(8px, 2vw, 24px) auto;
      padding: clamp(14px, 2.3vw, 28px);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(20, 27, 42, 0.72), rgba(13, 18, 29, 0.78));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: minmax(0, 2.15fr) minmax(290px, 1fr);
      gap: clamp(14px, 2vw, 22px);
    }

    .canvas-pane {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .canvas-card,
    .info-pane {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }

    .canvas-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .canvas-header {
      padding: clamp(14px, 1.8vw, 18px) clamp(16px, 2vw, 22px) clamp(12px, 1.5vw, 14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 10px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        var(--panel);
    }

    .canvas-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-width: 0;
    }

    .canvas-title {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .canvas-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 52ch;
    }

    .canvas-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
    }

    .header-link {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      padding: 10px 14px;
      text-decoration: none;
      font: inherit;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .canvas-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .view-mode-toggle[aria-pressed="true"] {
      color: #0d1710;
      background:
        linear-gradient(135deg, rgba(229, 161, 93, 0.92), rgba(255, 255, 255, 0.82)),
        rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .canvas-badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--accent-2);
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .like-widget {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 28%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(11, 16, 27, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      flex: 0 0 auto;
    }

    .like-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1;
    }

    .like-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      height: 38px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      background: linear-gradient(135deg, rgba(143, 203, 99, 0.26), rgba(229, 161, 93, 0.18));
      transition: transform 160ms ease, border-color 160ms ease, opacity 160ms ease;
    }

    .like-button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .like-button:disabled {
      cursor: not-allowed;
      opacity: 0.76;
    }

    .like-widget[data-like-state="liked"] .like-button {
      color: var(--accent-2);
      background: linear-gradient(135deg, rgba(229, 161, 93, 0.24), rgba(255, 255, 255, 0.08));
    }

    .view-panel {
      min-width: 0;
      padding: 14px 16px;
      min-height: 68px;
      display: flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background:
        radial-gradient(circle at top left, rgba(143, 203, 99, 0.14), transparent 26%),
        radial-gradient(circle at 88% 22%, rgba(229, 161, 93, 0.12), transparent 18%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        rgba(9, 14, 24, 0.42);
    }

    .view-panel .canvas-subtitle {
      max-width: none;
    }

    .playback-controls {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
    }

    .playback-controls[hidden] {
      display: none;
    }

    .playback-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      min-width: 84px;
      height: 40px;
      padding: 0 16px;
      font: inherit;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      background:
        linear-gradient(135deg, rgba(143, 203, 99, 0.34), rgba(229, 161, 93, 0.22)),
        rgba(255, 255, 255, 0.04);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
    }

    .playback-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.2);
    }

    .playback-button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
      box-shadow: none;
    }

    .playback-button[aria-pressed="true"] {
      color: #0d1710;
      background:
        linear-gradient(135deg, rgba(229, 161, 93, 0.92), rgba(255, 255, 255, 0.82)),
        rgba(255, 255, 255, 0.08);
    }

    .playback-slider {
      width: 100%;
      margin: 0;
      accent-color: var(--accent-2);
      cursor: pointer;
    }

    .playback-slider:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .time-readout {
      min-width: 98px;
      padding: 10px 12px;
      border-radius: 14px;
      text-align: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e5edf8;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    #network {
      flex: 1 1 auto;
      min-height: 0;
      touch-action: none;
      overscroll-behavior: contain;
      background:
        radial-gradient(circle at 16% 18%, rgba(143, 203, 99, 0.08), transparent 18%),
        radial-gradient(circle at 84% 78%, rgba(229, 161, 93, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 249, 253, 0.98)),
        linear-gradient(90deg, rgba(162, 177, 205, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(162, 177, 205, 0.08) 1px, transparent 1px);
      background-size: auto, auto, auto, 48px 48px, 48px 48px;
    }

    .info-pane {
      background: var(--panel-strong);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 22px 20px 28px;
      height: 100%;
      overflow-y: auto;
    }

    .info-kicker {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.73rem;
      color: var(--accent-2);
      font-weight: 800;
    }

    .info-title {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
      color: var(--text);
    }

    .info-lead {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      padding: 12px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .stat-card strong {
      display: block;
      font-size: 1.1rem;
      color: var(--accent-2);
    }

    .stat-card span {
      display: block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tag-list,
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag,
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce6f5;
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      flex: 0 0 auto;
    }

    .meta {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #dce6f5;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .relationship-card {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(8, 12, 20, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .relationship-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .media-card {
      margin-top: 16px;
      padding: 12px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
        rgba(8, 12, 20, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .node-image {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .image-empty {
      display: grid;
      place-items: center;
      min-height: 170px;
      text-align: center;
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    @media (max-width: 1180px) {
      .app {
        grid-template-columns: minmax(0, 1.8fr) minmax(270px, 0.95fr);
      }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        width: min(100% - 16px, 1240px);
        height: auto;
        min-height: 0;
        margin: 8px auto;
        padding: 14px;
        grid-template-columns: 1fr;
      }

      .canvas-card {
        height: auto;
        min-height: 0;
      }

      #network {
        height: clamp(360px, 62dvh, 560px);
        min-height: clamp(360px, 62dvh, 560px);
      }

      .info-pane {
        height: auto;
        border-left: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .canvas-title-row {
        align-items: flex-start;
      }

      .canvas-actions {
        grid-template-columns: 1fr;
      }

      .canvas-links {
        justify-content: flex-start;
      }

      .playback-controls {
        grid-template-columns: 1fr;
      }

      .playback-button,
      .time-readout {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: calc(100% - 12px);
        margin: 6px auto;
        padding: 10px;
        border-radius: 20px;
      }

      .canvas-card,
      .info-pane {
        border-radius: 20px;
      }

      .canvas-title,
      .info-title {
        font-size: 1.28rem;
      }

      .canvas-subtitle,
      .info-lead {
        font-size: 0.9rem;
      }

      .canvas-title-row {
        flex-wrap: wrap;
      }

      .header-link,
      .canvas-badge,
      .like-button {
        padding: 9px 12px;
        font-size: 0.76rem;
      }

      .like-count,
      .like-button {
        height: 34px;
      }

      .like-count {
        min-width: 42px;
        padding: 0 10px;
      }

      .view-panel {
        padding: 13px 13px 15px;
      }

      .canvas-links {
        width: 100%;
      }

      #network {
        height: clamp(320px, 58dvh, 460px);
        min-height: clamp(320px, 58dvh, 460px);
      }

      .info-pane {
        padding: 18px 16px 22px;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="canvas-pane">
      <section class="canvas-card">
        <div class="canvas-header">
          <div class="canvas-title-row">
            <h1 class="canvas-title">Zerg Tech Tree</h1>
            <div class="like-widget" data-like-widget data-tree-key="zerg" data-tree-label="Zerg Tech Tree">
              <button class="like-button" type="button" data-like-button>Loading...</button>
              <span class="like-count" data-like-count aria-live="polite">--</span>
            </div>
          </div>
          <div class="canvas-actions">
            <div class="view-panel" id="view-panel" data-view-mode="full">
              <p class="canvas-subtitle" id="view-tip">
                Drag nodes, zoom the swarm map, and click any node or arrow for details.
              </p>
              <div class="playback-controls" id="playback-controls" hidden>
                <button class="playback-button" id="build-order-toggle" type="button" aria-pressed="false">Play</button>
                <input
                  class="playback-slider"
                  id="build-order-slider"
                  type="range"
                  min="0"
                  max="300"
                  value="0"
                  step="1"
                  aria-label="Build order timeline"
                />
                <div class="time-readout" id="build-order-time" aria-live="polite">Time: 0:00</div>
              </div>
            </div>
            <div class="canvas-links">
              <button class="header-link view-mode-toggle" id="view-mode-toggle" type="button" aria-pressed="false">View Build Order</button>
              <a class="header-link" href="index.html">Back to Wiki</a>
            </div>
          </div>
        </div>
        <div id="network"></div>
      </section>
    </main>

    <aside class="info-pane" id="info-panel"></aside>
  </div>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script>
    const rawNodes = [
      {
        name: "Minerals",
        label: "Minerals",
        group: "resource",
        x: 0,
        y: -340,
        details: {
          description: "Harvested by Drones from mineral patches.",
          cost: { minerals: null, gas: null, supply: null },
          usedFor: ["Core resource for units, structures, and morphs."]
        }
      },
      {
        name: "Vespene Gas",
        label: "Vespene\nGas",
        group: "resource",
        x: 0,
        y: -160,
        details: {
          description: "Harvested by Drones from Extractors built on Vespene Geysers.",
          cost: { minerals: null, gas: null, supply: null },
          requires: ["Extractor", "Drone"]
        }
      },
      {
        name: "Supply",
        label: "Supply",
        group: "resource",
        x: 0,
        y: 20,
        details: {
          description: "Determines the maximum number of units you can field. Provided by Hatcheries and Overlords.",
          cost: { minerals: null, gas: null, supply: null },
          providedBy: ["Hatchery", "Overlord"]
        }
      },
      {
        name: "Creep",
        label: "Creep",
        group: "mechanic",
        x: 0,
        y: 240,
        details: {
          description: "Biomatter generated by Hatcheries and Creep Tumors. Zerg buildings (except Extractors and Hatcheries) must be built on Creep. Zerg units move faster on Creep.",
          cost: { minerals: null, gas: null, supply: null },
          producedBy: ["Hatchery", "Queen"],
          requiredFor: [
            "Spawning Pool",
            "Evolution Chamber",
            "Spine Crawler",
            "Spore Crawler",
            "Roach Warren",
            "Baneling Nest",
            "Hydralisk Den",
            "Spire",
            "Infestation Pit",
            "Nydus Network",
            "Ultralisk Cavern"
          ]
        }
      },
      {
        name: "Hatchery",
        label: "Hatchery",
        group: "tier1",
        x: 340,
        y: -260,
        details: {
          description: "Primary town hall. Produces Larvae, Queens, and spreads Creep. Unlocks Spawning Pool, Extractor, Evolution Chamber. Upgrades to Lair.",
          cost: { minerals: 300, gas: 0, supply: 0 },
          produces: ["Larva", "Queen"],
          unlocks: ["Spawning Pool", "Extractor", "Evolution Chamber"],
          morphsTo: ["Lair"],
          provides: ["Supply"],
          spreads: ["Creep"]
        }
      },
      {
        name: "Larva",
        label: "Larva",
        group: "mechanic",
        x: 340,
        y: -20,
        details: {
          description: "Automatically spawns at Hatcheries, Lairs, and Hives. Morphs into almost all Zerg units.",
          cost: { minerals: null, gas: null, supply: null },
          requires: ["Hatchery"],
          producedBy: ["Hatchery", "Lair", "Hive", "Queen"],
          morphsTo: [
            "Drone",
            "Overlord",
            "Zergling",
            "Roach",
            "Hydralisk",
            "Mutalisk",
            "Corruptor",
            "Infestor",
            "Swarm Host",
            "Ultralisk",
            "Viper"
          ]
        }
      },
      {
        name: "Drone",
        label: "Drone",
        group: "worker",
        x: 340,
        y: 240,

      }, delay || 0);
    }

    function fitNetworkToViewport() {
      const viewportWidth = container.clientWidth;
      const viewportHeight = container.clientHeight;
      if (!viewportWidth || !viewportHeight) {
        return;
      }

      const graphBounds = currentViewMode === "build" ? buildGraphBounds : fullGraphBounds;
      const horizontalPadding = 440;
      const verticalPadding = 360;
      const spanX = graphBounds.maxX - graphBounds.minX + horizontalPadding;
      const spanY = graphBounds.maxY - graphBounds.minY + verticalPadding;
      let scale = Math.min(viewportWidth / spanX, viewportHeight / spanY);

      if (window.matchMedia("(max-width: 980px)").matches) {
        scale *= 0.92;
      }

      network.moveTo({
        position: {
          x: (graphBounds.minX + graphBounds.maxX) / 2,
          y: (graphBounds.minY + graphBounds.maxY) / 2
        },
        scale: Math.max(0.08, Math.min(scale, 1)),
        animation: false
      });
    }

    function formatPlaybackTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes + ":" + String(seconds).padStart(2, "0");
    }

    function setPlaybackButtonState(isPlaying) {
      playbackToggle.textContent = isPlaying ? "Pause" : "Play";
      playbackToggle.setAttribute("aria-pressed", String(isPlaying));
    }

    function setPlaybackSliderTime(currentTime) {
      playbackSlider.setAttribute("aria-valuetext", formatPlaybackTime(currentTime));
      playbackTime.textContent = "Time: " + formatPlaybackTime(currentTime);
    }

    function showFullTechTree() {
      visNodes.update(
        rawNodes.map((node) => ({
          id: node.name,
          hidden: false
        }))
      );

      visEdges.update(
        rawRelations.map((relation, index) => ({
          id: "edge-" + (index + 1),
          hidden: false
        }))
      );
    }

    function setPlaybackControlsEnabled(isEnabled) {
      viewPanel.dataset.viewMode = isEnabled ? "build" : "full";
      viewTip.hidden = isEnabled;
      playbackControls.hidden = !isEnabled;
      playbackToggle.disabled = !isEnabled;
      playbackSlider.disabled = !isEnabled;
    }

    function stopPlayback() {
      if (playbackTimer !== null) {
        window.clearInterval(playbackTimer);
        playbackTimer = null;
      }

      setPlaybackButtonState(false);
    }

    function syncSelectionWithVisibility(visibleNodeIds, visibleEdgeIds) {
      const selection = network.getSelection();
      const hasHiddenNodeSelection = selection.nodes.some((nodeId) => !visibleNodeIds.has(nodeId));
      const hasHiddenEdgeSelection = selection.edges.some((edgeId) => !visibleEdgeIds.has(edgeId));

      if (hasHiddenNodeSelection || hasHiddenEdgeSelection) {
        network.unselectAll();
        if (currentViewMode === "build") {
          renderBuildOrderPanel();
        } else {
          renderDefaultPanel();
        }
      }
    }

    function updateBuildOrderVisibility(currentTime) {
      const visibleNodeIds = getVisibleNodeIdsAtTime(currentTime);

      visNodes.update(
        rawNodes.map((node) => ({
          id: node.name,
          hidden: !visibleNodeIds.has(node.name)
        }))
      );

      const visibleEdgeIds = new Set();
      visEdges.update(
        rawRelations.map((relation, index) => {
          const edgeId = "edge-" + (index + 1);
          const isVisible = visibleNodeIds.has(relation.fromName) && visibleNodeIds.has(relation.toName);
          if (isVisible) {
            visibleEdgeIds.add(edgeId);
          }

          return {
            id: edgeId,
            hidden: !isVisible
          };
        })
      );

      setPlaybackSliderTime(currentTime);
      syncSelectionWithVisibility(visibleNodeIds, visibleEdgeIds);
    }

    function setViewMode(mode) {
      const isBuildMode = mode === "build";
      currentViewMode = isBuildMode ? "build" : "full";

      if (isBuildMode) {
        updateBuildOrderVisibility(Number(playbackSlider.value));
        renderBuildOrderPanel();
      } else {
        stopPlayback();
        showFullTechTree();
        renderDefaultPanel();
      }

      setPlaybackControlsEnabled(isBuildMode);
      viewModeToggle.textContent = isBuildMode ? "View Full Tech Tree" : "View Build Order";
      viewModeToggle.setAttribute("aria-pressed", String(isBuildMode));
      scheduleNetworkFit(60);
    }

    function startPlayback() {
      if (playbackTimer !== null) {
        return;
      }

      if (Number(playbackSlider.value) >= buildOrderDuration) {
        playbackSlider.value = "0";
        updateBuildOrderVisibility(0);
      }

      setPlaybackButtonState(true);
      playbackTimer = window.setInterval(function () {
        const currentTime = Number(playbackSlider.value);
        if (currentTime >= buildOrderDuration) {
          stopPlayback();
          return;
        }

        const nextTime = currentTime + 1;
        playbackSlider.value = String(nextTime);
        updateBuildOrderVisibility(nextTime);

        if (nextTime >= buildOrderDuration) {
          stopPlayback();
        }
      }, 100);
    }

    playbackSlider.max = String(buildOrderDuration);
    playbackToggle.setAttribute("aria-label", "Play or pause " + buildOrderName);
    viewModeToggle.setAttribute("aria-label", "Toggle between the full tech tree and build order playback");
    playbackToggle.addEventListener("click", function () {
      if (playbackTimer !== null) {
        stopPlayback();
        return;
      }

      startPlayback();
    });

    playbackSlider.addEventListener("input", function () {
      const currentTime = Number(playbackSlider.value);
      setPlaybackSliderTime(currentTime);

      if (currentViewMode === "build") {
        updateBuildOrderVisibility(currentTime);
      }
    });

    setPlaybackButtonState(false);
    setPlaybackSliderTime(Number(playbackSlider.value));
    viewModeToggle.addEventListener("click", function () {
      setViewMode(currentViewMode === "build" ? "full" : "build");
    });
    setViewMode("full");

    scheduleNetworkFit(80);

    window.addEventListener("resize", function () {
      const widthDelta = Math.abs(window.innerWidth - lastViewportWidth);
      const heightDelta = Math.abs(window.innerHeight - lastViewportHeight);
      const isCompactViewport = window.matchMedia("(max-width: 980px)").matches;
      const viewportModeChanged = isCompactViewport !== wasCompactViewport;

      lastViewportWidth = window.innerWidth;
      lastViewportHeight = window.innerHeight;
      wasCompactViewport = isCompactViewport;

      if (viewportModeChanged || widthDelta > 60 || heightDelta > 140) {
        scheduleNetworkFit(140);
      }
    }, { passive: true });

    window.addEventListener("orientationchange", function () {
      scheduleNetworkFit(180);
    }, { passive: true });

    window.addEventListener("pageshow", function () {
      scheduleNetworkFit(60);
    });

    network.once("stabilized", function () {
      fitNetworkToViewport();
    });

    network.on("click", function (params) {
      if (params.nodes.length) {
        if (currentViewMode === "build") {
          renderBuildOrderNodePanel(nodesById[params.nodes[0]]);
        } else {
          renderNodePanel(nodesById[params.nodes[0]]);
        }
        return;
      }

      if (params.edges.length) {
        renderEdgePanel(visEdges.get(params.edges[0]));
        return;
      }

      if (currentViewMode === "build") {
        renderBuildOrderPanel();
        return;
      }

      renderDefaultPanel();
    });
  </script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="tech-tree-likes.js"></script>
</body>
